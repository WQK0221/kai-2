<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        .display {
            background: #16213e;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: right;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .display input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 36px;
            font-weight: 600;
            text-align: right;
            letter-spacing: 2px;
        }

        .display .history {
            font-size: 16px;
            color: #888888;
            margin-bottom: 5px;
            min-height: 24px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .btn {
            padding: 20px;
            font-size: 20px;
            font-weight: 600;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #2d3436;
            color: #ffffff;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn.operator {
            background: linear-gradient(135deg, #e17055 0%, #fd79a8 100%);
            color: #ffffff;
        }

        .btn.operator:hover {
            background: linear-gradient(135deg, #d35400 0%, #e84393 100%);
        }

        .btn.clear {
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
        }

        .btn.clear:hover {
            background: linear-gradient(135deg, #5b4cdb 0%, #918af0 100%);
        }

        .btn.equal {
            background: linear-gradient(135deg, #00b894 0%, #55efc4 100%);
            color: #ffffff;
            grid-column: span 2;
        }

        .btn.equal:hover {
            background: linear-gradient(135deg, #00a383 0%, #44dbb5 100%);
        }

        .btn.number {
            background: linear-gradient(135deg, #636e72 0%, #b2bec3 100%);
        }

        .btn.number:hover {
            background: linear-gradient(135deg, #555e62 0%, #a1adb5 100%);
        }

        .btn.decimal {
            background: linear-gradient(135deg, #636e72 0%, #b2bec3 100%);
        }

        .btn.decimal:hover {
            background: linear-gradient(135deg, #555e62 0%, #a1adb5 100%);
        }

        .btn.percent {
            background: linear-gradient(135deg, #636e72 0%, #b2bec3 100%);
        }

        .btn.percent:hover {
            background: linear-gradient(135deg, #555e62 0%, #a1adb5 100%);
        }

        .btn.sign {
            background: linear-gradient(135deg, #636e72 0%, #b2bec3 100%);
        }

        .btn.sign:hover {
            background: linear-gradient(135deg, #555e62 0%, #a1adb5 100%);
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="history" id="history"></div>
            <input type="text" id="display" readonly>
        </div>
        
        <div class="buttons">
            <button class="btn clear" onclick="clearDisplay()">C</button>
            <button class="btn sign" onclick="toggleSign()">±</button>
            <button class="btn percent" onclick="calculatePercent()">%</button>
            <button class="btn operator" onclick="appendOperator('/')">÷</button>
            
            <button class="btn number" onclick="appendNumber('7')">7</button>
            <button class="btn number" onclick="appendNumber('8')">8</button>
            <button class="btn number" onclick="appendNumber('9')">9</button>
            <button class="btn operator" onclick="appendOperator('*')">×</button>
            
            <button class="btn number" onclick="appendNumber('4')">4</button>
            <button class="btn number" onclick="appendNumber('5')">5</button>
            <button class="btn number" onclick="appendNumber('6')">6</button>
            <button class="btn operator" onclick="appendOperator('-')">−</button>
            
            <button class="btn number" onclick="appendNumber('1')">1</button>
            <button class="btn number" onclick="appendNumber('2')">2</button>
            <button class="btn number" onclick="appendNumber('3')">3</button>
            <button class="btn operator" onclick="appendOperator('+')">+</button>
            
            <button class="btn number" onclick="appendNumber('0')">0</button>
            <button class="btn decimal" onclick="appendDecimal('.')">.</button>
            <button class="btn equal" onclick="calculateResult()">=</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let history = document.getElementById('history');
        let currentInput = '';
        let previousInput = '';
        let operator = null;

        function appendNumber(number) {
            if (currentInput === '0' && number === '0') return;
            if (currentInput === '0' && number !== '0') {
                currentInput = number;
            } else {
                currentInput += number;
            }
            updateDisplay();
        }

        function appendDecimal(decimal) {
            if (!currentInput.includes('.')) {
                if (currentInput === '') {
                    currentInput = '0' + decimal;
                } else {
                    currentInput += decimal;
                }
                updateDisplay();
            }
        }

        function appendOperator(op) {
            if (currentInput === '') return;
            
            if (previousInput !== '') {
                calculateResult();
            }
            
            previousInput = currentInput;
            operator = op;
            currentInput = '';
            history.textContent = previousInput + ' ' + operator;
        }

        function calculateResult() {
            if (previousInput === '' || currentInput === '' || operator === null) return;

            let result;
            const num1 = parseFloat(previousInput);
            const num2 = parseFloat(currentInput);

            switch (operator) {
                case '+':
                    result = num1 + num2;
                    break;
                case '-':
                    result = num1 - num2;
                    break;
                case '*':
                    result = num1 * num2;
                    break;
                case '/':
                    if (num2 === 0) {
                        result = '错误';
                    } else {
                        result = num1 / num2;
                    }
                    break;
                default:
                    return;
            }

            history.textContent = previousInput + ' ' + operator + ' ' + currentInput + ' =';
            currentInput = result.toString();
            previousInput = '';
            operator = null;
            updateDisplay();
        }

        function calculatePercent() {
            if (currentInput !== '') {
                currentInput = (parseFloat(currentInput) / 100).toString();
                updateDisplay();
            }
        }

        function toggleSign() {
            if (currentInput !== '') {
                currentInput = (parseFloat(currentInput) * -1).toString();
                updateDisplay();
            }
        }

        function clearDisplay() {
            currentInput = '';
            previousInput = '';
            operator = null;
            display.value = '0';
            history.textContent = '';
        }

        function updateDisplay() {
            display.value = currentInput || '0';
        }

        clearDisplay();
    </script>
</body>
</html>
